name: Release zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the downloadable zip"
        required: true
        default: "dev"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build downloadable workspace
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          python scripts/build_release_zip.py "$VERSION"

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/opencareloop-${{ github.ref_name }}.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: opencareloop-${{ inputs.version }}
          path: dist/opencareloop-${{ inputs.version }}.zip
