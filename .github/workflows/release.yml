name: Release alpha zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the downloadable zip"
        required: true
        default: "dev"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      VERSIONED_ZIP: dist/opencareloop-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}.zip
      STABLE_ZIP: dist/OpenCareLoop.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build downloadable workspace
        run: |
          python scripts/build_release_zip.py "$VERSION"

      - name: Prepare stable release asset
        run: cp "$VERSIONED_ZIP" "$STABLE_ZIP"

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: OpenCareLoop ${{ github.ref_name }} (Alpha)
          prerelease: true
          body: |
            Alpha release: use carefully and review all outputs before acting on them.

            OpenCareLoop is early-stage software for non-urgent use. Expect rough edges, incomplete workflows, and mistakes. Do not rely on it for urgent, time-sensitive, or high-risk medical decisions.
          files: |
            ${{ env.VERSIONED_ZIP }}
            ${{ env.STABLE_ZIP }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: opencareloop-${{ inputs.version }}
          path: |
            ${{ env.VERSIONED_ZIP }}
            ${{ env.STABLE_ZIP }}
